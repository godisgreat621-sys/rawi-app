name: my_first_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  provider: ^6.1.2
  flutter_windowmanager: ^0.2.0
  google_fonts: ^8.1.0
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.1.2
  firebase_storage: ^12.3.2
  rxdart: ^0.27.7
  http: ^1.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

scripts:
  deploy: flutter build web && cd build/web && npx vercel . --prod